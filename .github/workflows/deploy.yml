name: Deploy Cerveceria Stammtisch

# Required GitHub variables:
#   none
#
# Required GitHub secrets:
#   NOMAD_ADDR
#   NOMAD_TOKEN
#   CERVECERIA_DB_PASSWORD

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    env:
      NOMAD_ADDR: ${{ secrets.NOMAD_ADDR }}
      NOMAD_TOKEN: ${{ secrets.NOMAD_TOKEN }}
      CERVECERIA_DB_PASSWORD: ${{ secrets.CERVECERIA_DB_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate deploy inputs
        shell: bash
        run: |
          set -euo pipefail
          missing=()
          for var in NOMAD_ADDR NOMAD_TOKEN CERVECERIA_DB_PASSWORD; do
            if [ -z "${!var:-}" ]; then
              missing+=("$var")
            fi
          done

          if [ "${#missing[@]}" -ne 0 ]; then
            printf 'Missing required GitHub settings: %s\n' "${missing[*]}" >&2
            exit 1
          fi

      - name: Prepare db-init SQL
        shell: pwsh
        run: |
          .\nomad\scripts\extract-db-dump.ps1 -SourcePath .\cerveceria.sql -OutputSql .\nomad\dist\db-init\01-restore.sql

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push WordPress image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/cerveceriastammtisch-wordpress:latest
            ghcr.io/${{ github.repository_owner }}/cerveceriastammtisch-wordpress:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push MariaDB image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: nomad/mariadb.Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/cerveceriastammtisch-mariadb:latest
            ghcr.io/${{ github.repository_owner }}/cerveceriastammtisch-mariadb:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Setup Nomad
        uses: hashicorp/setup-nomad@main
        with:
          version: "1.7.6"

      - name: Build Nomad vars file
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          def hcl_string(value: str) -> str:
              return json.dumps(value)

          lines = [
              f'wordpress_image = {hcl_string(os.environ["WORDPRESS_IMAGE"])}',
              f'mariadb_image   = {hcl_string(os.environ["MARIADB_IMAGE"])}',
              f'db_password     = {hcl_string(os.environ["CERVECERIA_DB_PASSWORD"])}',
          ]

          Path("/tmp/wordpress.nomad.vars.hcl").write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY
        env:
          WORDPRESS_IMAGE: ghcr.io/${{ github.repository_owner }}/cerveceriastammtisch-wordpress:${{ github.sha }}
          MARIADB_IMAGE: ghcr.io/${{ github.repository_owner }}/cerveceriastammtisch-mariadb:${{ github.sha }}

      - name: Deploy Nomad job
        shell: bash
        run: |
          set -euo pipefail
          nomad job run -detach -var-file=/tmp/wordpress.nomad.vars.hcl nomad/wordpress.nomad.hcl
